# Local overlay: publish host ports + local Caddy (no TLS, *.localhost). All images are pulled.
#   ./apply.sh local && docker compose up -d
name: teable-sandbox-infra

services:
  opensandbox-server:
    ports:
      - "8090:8090"          # curl the engine directly for local verification (not published in server)

  infra-service:
    ports:
      - "8080:8080"
    environment:
      APP_RUNTIME_DOMAIN: ${APP_RUNTIME_DOMAIN:-localhost}          # browser access via http://<appId>.localhost (through caddy:80)
      APP_RUNTIME_PUBLIC_SCHEME: ${APP_RUNTIME_PUBLIC_SCHEME:-http}
      APP_RUNTIME_ARTIFACT_S3_ENDPOINT: ${S3_ENDPOINT:?run ./apply.sh local first}    # presigned URLs bind to this host; apply.sh fills in the host LAN IP
      GIT_REGISTRY_PUBLIC_URL: ${GIT_REGISTRY_PUBLIC_URL:-http://localhost:8081}       # only for external/console manual clone

  git-registry:
    ports:
      - "8081:8080"

  minio:
    ports:
      - "9000:9000"          # S3 API
      - "9001:9001"          # console UI

  # Local entrypoint: no TLS, the official image suffices. Host ports 80 and 8088 both map to container :80
  # (8088 is the alternate entry used when the Teable app runs outside this stack and needs the Infra API + sandbox previews).
  caddy:
    image: caddy:2.9.1
    container_name: caddy
    restart: unless-stopped
    networks: [teable-appnet]
    ports:
      - "80:80"
      - "8088:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - ./caddy.snippets:/etc/caddy/caddy.snippets:ro
    environment:
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:?run ./apply.sh local first}   # injected server-side by the sandbox preview block
      SANDBOX_PREVIEW_HOST: ${SANDBOX_PREVIEW_HOST:-sandbox.localhost:8088}     # rewrite target for port previews (no scheme)
    depends_on:
      infra-service:
        condition: service_healthy
      opensandbox-server:
        condition: service_started
