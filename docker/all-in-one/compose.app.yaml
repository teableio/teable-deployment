# Teable app overlay -- adds app + PG + Redis on top of the Infra base, forming the full-featured single-node stack (all-in-one).
#   Local: ./apply.sh local --with-app && docker compose up -d
#   Server: ./apply.sh server --with-app && docker compose up -d
# Mode-independent differences all go through .env (PUBLIC_ORIGIN / attachment endpoint derived per mode by apply.sh);
# mode-specific structural differences (Caddyfile / preview domains) live in compose.app.{local,server}.yaml.
# Every variable name here was verified against the app/infra source; do not rename from memory.

networks:
  # Data-plane network: only app/db/redis attach. Dynamic app containers run user code and sit on teable-appnet,
  # so they get no path that can reach PG/Redis; sandboxes are on sandbox-net and already isolated.
  teable-data-net:
    name: teable-data-net
    driver: bridge

volumes:
  teable-db-data:
  teable-redis-data:
  teable-assets:

services:
  teable:
    image: ${TEABLE_IMAGE:-ghcr.io/teableio/teable:latest}
    container_name: teable
    restart: unless-stopped
    networks: [teable-appnet, teable-data-net]
    volumes:
      - teable-assets:/app/.assets
    environment:
      TZ: ${TIMEZONE:-UTC}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?run ./apply.sh first}
      # --- Database (standard single DB; PG publishes no host port and PUBLIC_DATABASE_PROXY is unset) ---
      PRISMA_DATABASE_URL: postgresql://${TEABLE_DB_USER:-teable}:${TEABLE_DB_PASSWORD:?run ./apply.sh first}@teable-db:5432/${TEABLE_DB_NAME:-teable}
      # --- Cache ---
      BACKEND_CACHE_PROVIDER: redis
      BACKEND_CACHE_REDIS_URI: redis://default:${TEABLE_REDIS_PASSWORD:?run ./apply.sh first}@teable-redis:6379/0
      # --- Attachment storage (MinIO dual buckets; ENDPOINT = browser-reachable address for presigning, INTERNAL = in-container direct connection) ---
      BACKEND_STORAGE_PROVIDER: minio
      BACKEND_STORAGE_MINIO_ENDPOINT: ${TEABLE_MINIO_ENDPOINT_HOST:?run ./apply.sh first}
      BACKEND_STORAGE_MINIO_PORT: ${TEABLE_MINIO_ENDPOINT_PORT:?run ./apply.sh first}
      BACKEND_STORAGE_MINIO_USE_SSL: ${TEABLE_MINIO_USE_SSL:?run ./apply.sh first}
      BACKEND_STORAGE_MINIO_INTERNAL_ENDPOINT: minio
      BACKEND_STORAGE_MINIO_INTERNAL_PORT: "9000"
      BACKEND_STORAGE_MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:?run ./apply.sh first}
      BACKEND_STORAGE_MINIO_SECRET_KEY: ${S3_SECRET_KEY:?run ./apply.sh first}
      BACKEND_STORAGE_PUBLIC_BUCKET: ${TEABLE_PUBLIC_BUCKET:-teable-public}
      BACKEND_STORAGE_PRIVATE_BUCKET: ${TEABLE_PRIVATE_BUCKET:-teable-private}
      # Attachment token encryption: the source-code defaults are hardcoded in the public repo, so these must be generated by apply.sh
      BACKEND_STORAGE_ENCRYPTION_KEY: ${BACKEND_STORAGE_ENCRYPTION_KEY:?run ./apply.sh first}
      BACKEND_STORAGE_ENCRYPTION_IV: ${BACKEND_STORAGE_ENCRYPTION_IV:?run ./apply.sh first}
      # --- Infra contract (the app talks only to infra-service, never directly to opensandbox-server) ---
      SANDBOX_PROVIDER: opensandbox
      # The engine runs on the docker backend: execd is non-root and cannot setuid; without declaring this it falls back to the kubernetes default with a pinned uid,
      # and every command inside the sandbox fails with "operation not permitted".
      SANDBOX_OPENSANDBOX_RUNTIME: docker
      APP_DEPLOY_PROVIDER: docker-runtime
      TEABLE_INFRA_API_URL: http://infra-service:8080
      TEABLE_INFRA_API_KEY: ${OPENSANDBOX_API_KEY:?run ./apply.sh first}
      TEABLE_INFRA_BUCKET: teable-agent   # virtual bucket served by infra-service's S3-compat endpoint (backed by the shared agent volume), not a MinIO bucket
      SANDBOX_OPENSANDBOX_IMAGE: ${SANDBOX_OPENSANDBOX_IMAGE:?set in .env}
      # --- Automation script execution: SANDBOX_URL unset (start.sh detects this and auto-starts the integrated sandbox in-container) ---
      SANDBOX_JWT_SECRET: ${SANDBOX_JWT_SECRET:?run ./apply.sh first}
    # Image ships node; /health needs no auth. First start runs db migrations, so start_period is relaxed.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    depends_on:
      teable-db:
        condition: service_healthy
      teable-redis:
        condition: service_healthy
      infra-service:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  teable-db:
    image: ${TEABLE_DB_IMAGE:-postgres:15.4}
    container_name: teable-db
    restart: unless-stopped
    networks: [teable-data-net]
    volumes:
      - teable-db-data:/var/lib/postgresql/data
    environment:
      TZ: ${TIMEZONE:-UTC}
      POSTGRES_DB: ${TEABLE_DB_NAME:-teable}
      POSTGRES_USER: ${TEABLE_DB_USER:-teable}
      POSTGRES_PASSWORD: ${TEABLE_DB_PASSWORD:?run ./apply.sh first}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 3

  teable-redis:
    image: ${TEABLE_REDIS_IMAGE:-redis:7.2.4}
    container_name: teable-redis
    restart: unless-stopped
    networks: [teable-data-net]
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${TEABLE_REDIS_PASSWORD:?run ./apply.sh first}"]
    volumes:
      - teable-redis-data:/data
    environment:
      REDISCLI_AUTH: ${TEABLE_REDIS_PASSWORD}      # only used by the healthcheck's redis-cli
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Extends the base bucket creation: besides the artifact bucket, adds the two attachment buckets (public bucket allows anonymous download; MinIO default CORS allows everything).
  minio-init:
    command:
      - >
        until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" >/dev/null 2>&1; do
          echo 'waiting for minio...'; sleep 2;
        done;
        mc mb --ignore-existing "local/$$S3_BUCKET";
        mc mb --ignore-existing "local/$$TEABLE_PUBLIC_BUCKET";
        mc mb --ignore-existing "local/$$TEABLE_PRIVATE_BUCKET";
        mc anonymous set download "local/$$TEABLE_PUBLIC_BUCKET";
        echo "buckets ready: $$S3_BUCKET $$TEABLE_PUBLIC_BUCKET $$TEABLE_PRIVATE_BUCKET";
    environment:
      TEABLE_PUBLIC_BUCKET: ${TEABLE_PUBLIC_BUCKET:-teable-public}
      TEABLE_PRIVATE_BUCKET: ${TEABLE_PRIVATE_BUCKET:-teable-private}
