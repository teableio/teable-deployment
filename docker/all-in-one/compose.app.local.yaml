# all-in-one local-mode overlay: Teable becomes the :80 catch-all; console moves to infra.localhost, app previews to *.app.localhost.
# (In infra-only local mode the :80 catch-all is infra-service; once the app is added the primary site is mentally Teable, hence the Caddyfile swap.)
name: teable-sandbox-infra

services:
  infra-service:
    environment:
      # Preview domain split from the Teable main site: <appId>.app.localhost (infra-only mode uses <appId>.localhost via the catch-all)
      APP_RUNTIME_DOMAIN: app.localhost

  teable:
    environment:
      # The Infra entrypoint must include the /v1 split (the SDK uses it to call the engine directly); points at caddy's internal alias, not the bare infra-service container.
      TEABLE_INFRA_API_URL: http://infra.localhost
      # Local mode has no wildcard sandbox DNS inside containers, so all sandbox traffic
      # (including the AI chat agent connection) goes through the engine's path-based
      # /v1 proxy instead of per-port subdomains. Requires opensandbox-server >= v0.2.0-fix5
      # and a Teable release carrying SANDBOX_OPENSANDBOX_USE_SERVER_PROXY support;
      # older app builds simply ignore this variable.
      SANDBOX_OPENSANDBOX_USE_SERVER_PROXY: "true"

  caddy:
    networks:
      teable-appnet:
        aliases:
          - infra.localhost        # app containers reach the Infra entry over the internal network (Host matches infra_and_v1)
    volumes:
      # Same-target override of the base mount: swap in the entry config that carries the Teable routes
      - ./Caddyfile.app.local:/etc/caddy/Caddyfile:ro
      - ./caddy.snippets:/etc/caddy/caddy.snippets:ro
    environment:
      TEABLE_PUBLIC_BUCKET: ${TEABLE_PUBLIC_BUCKET:-teable-public}   # used for public-bucket path forwarding
      # Sandbox endpoint/preview domain: local mode always uses local domains. Browser preview resolves
      # *.sandbox.localhost natively; machine-side sandbox traffic goes through the /v1 path proxy
      # (SANDBOX_OPENSANDBOX_USE_SERVER_PROXY above), so no wildcard DNS is needed anywhere.
      SANDBOX_PREVIEW_HOST: ${SANDBOX_PREVIEW_HOST:-sandbox.localhost}
