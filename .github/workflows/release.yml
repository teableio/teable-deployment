# Publishes a GitHub Release when a platform release tag lands (tags are pushed
# by the release pipeline of the source repository). Release notes come from the
# matching section of CHANGELOG.md.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    name: GitHub Release from changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract the changelog section
        run: |
          awk -v ver="${GITHUB_REF_NAME}" '
            $0 ~ ("^## " ver "( |$)") { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            printf 'See CHANGELOG.md and VERSIONS.md at this tag for details.\n' > /tmp/notes.md
          fi
          cat /tmp/notes.md

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file /tmp/notes.md \
            --verify-tag
