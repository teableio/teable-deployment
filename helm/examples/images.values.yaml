# Image pins for this release, and nothing else.
# Prefer this over swapping images by hand (kubectl set image): applying it
# updates the same containers AND keeps the Helm release in sync, so the next
# `helm upgrade` will not silently roll your images back:
#
#   helm upgrade teable helm/teable-infra -n opensandbox-system \
#     --reuse-values -f helm/examples/images.values.yaml
#
# On Helm 4 add --server-side=true --force-conflicts if you previously
# swapped an image with kubectl set image (server-side apply refuses to
# take the field back otherwise).
#
# Generated by the release pipeline from the chart defaults. Do not edit by hand.
teable:
  image: ghcr.io/teableio/teable:latest
postgres:
  image: postgres:15.4
redis:
  image: redis:7.2.4
minio:
  image: minio/minio:latest
  mcImage: minio/mc:latest
infraService:
  image: ghcr.io/teableio/teable-infra-service:20260625T042613Z
imagePreheater:
  image: registry.cn-shenzhen.aliyuncs.com/teable/opensandbox-image-committer:v0.1.0-amd64
opensandbox-controller:
  controller:
    image:
      repository: registry.cn-shenzhen.aliyuncs.com/teable/opensandbox-controller
      tag: v0.2.0-amd64
    snapshot:
      imageCommitterImage: registry.cn-shenzhen.aliyuncs.com/teable/opensandbox-image-committer:v0.1.0-amd64
opensandbox-server:
  server:
    image:
      repository: registry.cn-shenzhen.aliyuncs.com/teable/opensandbox-server
      tag: v0.2.0-fix4
    gateway:
      image:
        repository: registry.cn-shenzhen.aliyuncs.com/teable/opensandbox-ingress
        tag: v1.0.7-amd64
