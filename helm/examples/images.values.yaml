# Image pins for this release, and nothing else.
# Prefer this over swapping images by hand (kubectl set image): applying it
# updates the same containers AND keeps the Helm release in sync, so the next
# `helm upgrade` will not silently roll your images back:
#
#   helm upgrade teable helm/teable-infra -n opensandbox-system \
#     --reuse-values -f helm/examples/images.values.yaml
#
# On Helm 4 add --server-side=true --force-conflicts if you previously
# swapped an image with kubectl set image (server-side apply refuses to
# take the field back otherwise).
#
# Run the upgrade from this repository checked out at the platform release
# tag: two sidecar references (execd/egress) are embedded in the chart
# value opensandbox-server.configToml and ride the chart, not this file
# (the imagePreheater.images list below mirrors them and must stay in sync).
#
# Generated by the release pipeline from the chart defaults. Do not edit by hand.
teable:
  image: ghcr.io/teableio/teable:latest
postgres:
  image: postgres:15.4
redis:
  image: redis:7.2.4
minio:
  image: minio/minio:latest
  mcImage: minio/mc:latest
infraService:
  image: ghcr.io/teableio/teable-infra-service:20260717T025434Z
  appRuntime:
    defaultImage: ghcr.io/teableio/teable-app-runtime:20260717T025434Z
    allowedImagePrefixes:
    - ghcr.io/teableio/
imagePreheater:
  image: ghcr.io/teableio/opensandbox-image-committer:v0.1.0
  images:
  - ghcr.io/teableio/opensandbox-execd:v1.0.19-fix2
  - ghcr.io/teableio/opensandbox-egress:v1.0.12
opensandbox-controller:
  controller:
    image:
      repository: ghcr.io/teableio/opensandbox-controller
      tag: v0.2.0
    snapshot:
      imageCommitterImage: ghcr.io/teableio/opensandbox-image-committer:v0.1.0
opensandbox-server:
  server:
    image:
      repository: ghcr.io/teableio/opensandbox-server
      tag: v0.2.0-fix6
    gateway:
      image:
        repository: ghcr.io/teableio/opensandbox-ingress
        tag: v1.0.7
