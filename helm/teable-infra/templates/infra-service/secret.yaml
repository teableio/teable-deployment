{{- /*
Session secret bootstrap for a turnkey install: infra-service requires the Secret
referenced by sessionSecretName/sessionSecretKey, which nothing created before.
Idempotent: on upgrade the existing value is reused (lookup), so sessions survive.
Guard: if the Secret already exists but is not owned by this release (externally
managed, e.g. created via kubectl), the chart skips it instead of colliding.
*/}}
{{- if and .Values.infraService.enabled .Values.infraService.sessionSecret.create }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $name := .Values.infraService.sessionSecretName }}
{{- $key := .Values.infraService.sessionSecretKey }}
{{- $existing := lookup "v1" "Secret" $namespace $name }}
{{- $existingAnnotations := dict }}
{{- if $existing }}
{{- $existingAnnotations = $existing.metadata.annotations | default dict }}
{{- end }}
{{- $ownedByRelease := and $existing (eq (get $existingAnnotations "meta.helm.sh/release-name") .Release.Name) }}
{{- if or (not $existing) $ownedByRelease }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name | quote }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: infra-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
type: Opaque
data:
  {{ $key }}: {{ (get ($existing.data | default dict) $key) | default (randAlphaNum 40 | b64enc) }}
{{- end }}
{{- end }}
