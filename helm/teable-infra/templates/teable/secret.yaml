{{- /*
Teable app secret bundle for a turnkey install: DB/Redis passwords, MinIO root
credentials, the sandbox JWT secret and the storage encryption material. The app
source ships public hardcoded defaults for several of these, so every install must
generate its own values or stored credentials are decryptable by anyone.
Idempotent: on upgrade each existing key is reused (lookup), so credentials never
rotate accidentally (a rotated db-password would lock the app out of its own data).
Guard: if the Secret already exists but is not owned by this release (externally
managed, e.g. created via kubectl), the chart skips it instead of colliding.
*/}}
{{- if and .Values.teable.enabled .Values.teable.secret.create }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $name := .Values.teable.secret.name }}
{{- $existing := lookup "v1" "Secret" $namespace $name }}
{{- $existingData := dict }}
{{- $existingAnnotations := dict }}
{{- if $existing }}
{{- $existingData = $existing.data | default dict }}
{{- $existingAnnotations = $existing.metadata.annotations | default dict }}
{{- end }}
{{- $ownedByRelease := and $existing (eq (get $existingAnnotations "meta.helm.sh/release-name") .Release.Name) }}
{{- if or (not $existing) $ownedByRelease }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name | quote }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: teable
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
type: Opaque
data:
  db-password: {{ get $existingData "db-password" | default (randAlphaNum 24 | b64enc) }}
  redis-password: {{ get $existingData "redis-password" | default (randAlphaNum 24 | b64enc) }}
  sandbox-jwt-secret: {{ get $existingData "sandbox-jwt-secret" | default (randAlphaNum 48 | b64enc) }}
  {{- /* Exactly 16 chars each: the app encrypts storage tokens with aes-128-cbc, which requires a 16-byte key and IV. */}}
  storage-encryption-key: {{ get $existingData "storage-encryption-key" | default (randAlphaNum 16 | b64enc) }}
  storage-encryption-iv: {{ get $existingData "storage-encryption-iv" | default (randAlphaNum 16 | b64enc) }}
  {{- /* The teable- prefix makes the generated root user recognizable in MinIO audit logs. */}}
  minio-access-key: {{ get $existingData "minio-access-key" | default (printf "teable-%s" (randAlphaNum 8) | b64enc) }}
  minio-secret-key: {{ get $existingData "minio-secret-key" | default (randAlphaNum 32 | b64enc) }}
{{- end }}
{{- end }}
