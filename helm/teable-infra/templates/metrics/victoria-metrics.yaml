{{- /* Observability component: VictoriaMetrics (PVC + Deployment + Service).
     Independent of infra-service itself; still toggled by infraService.victoriaMetrics.enabled (key-path migration deferred). */}}
{{- if .Values.infraService.enabled }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $victoriaMetrics := .Values.infraService.victoriaMetrics }}
{{- if $victoriaMetrics.enabled }}
{{- $pvc := $victoriaMetrics.persistentVolumeClaim }}
{{- if not $pvc.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-victoria-metrics
  namespace: {{ $namespace }}
  annotations:
    # Keep metrics history across helm uninstall; delete the PVC explicitly to discard it.
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: opensandbox-victoria-metrics
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  accessModes:
    {{- toYaml ($pvc.accessModes | default (list "ReadWriteOnce")) | nindent 4 }}
  resources:
    requests:
      storage: {{ $pvc.storage | default "50Gi" | quote }}
  {{- /* When bound to a specific PV, keep storageClassName as-is (an explicit "" disables dynamic provisioning); when both are blank, omit the key so the cluster default StorageClass applies. */}}
  {{- if or $pvc.volumeName $pvc.storageClassName }}
  storageClassName: {{ $pvc.storageClassName | quote }}
  {{- end }}
  {{- with $pvc.volumeName }}
  volumeName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-victoria-metrics
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: opensandbox-victoria-metrics
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 1
  strategy:
    type: {{ $victoriaMetrics.updateStrategyType | default "RollingUpdate" | quote }}
    {{- with $victoriaMetrics.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: opensandbox-victoria-metrics
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensandbox-victoria-metrics
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: opensandbox
    spec:
      {{- with .Values.infraService.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: victoria-metrics
          image: {{ $victoriaMetrics.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - -storageDataPath={{ $victoriaMetrics.storageDataPath | default "/victoria-metrics-data" }}
            - -retentionPeriod={{ $victoriaMetrics.retentionPeriod | default "30d" }}
            - -httpListenAddr=:8428
          ports:
            - name: http
              containerPort: 8428
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml $victoriaMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ $victoriaMetrics.storageDataPath | default "/victoria-metrics-data" | quote }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $pvc.existingClaim | default (printf "%s-victoria-metrics" .Release.Name) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-victoria-metrics
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: opensandbox-victoria-metrics
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensandbox-victoria-metrics
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8428
      targetPort: http
{{- end }}
{{- end }}
