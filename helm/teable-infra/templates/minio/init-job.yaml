{{- /*
Bucket bootstrap for the bundled MinIO: the app and the App Runtime artifact store
expect their buckets to exist, and MinIO does not auto-create them. Runs as a Helm
hook on install and on every upgrade so bucket policy drift (e.g. a manually removed
anonymous-download rule) is healed; --ignore-existing keeps every step idempotent.
*/}}
{{- if .Values.minio.enabled }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $minio := .Values.minio }}
{{- $serviceName := printf "%s-minio" .Release.Name }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $serviceName }}-init
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: post-install,post-upgrade
    {{- /* before-hook-creation deletes the previous Job before creating the new one; Jobs are immutable, so this is what allows the hook to re-run on upgrades. */}}
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: opensandbox
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: {{ $minio.mcImage | quote }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              # The post-install hook can fire before the MinIO Pod is Ready; alias set doubles as the wait loop
              until mc alias set local "http://{{ $serviceName }}:9000" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio"
                sleep 2
              done
              mc mb --ignore-existing "local/{{ $minio.buckets.artifacts }}"
              mc mb --ignore-existing "local/{{ $minio.buckets.public }}"
              mc mb --ignore-existing "local/{{ $minio.buckets.private }}"
              # The app links avatars/attachments as plain <origin>/<bucket>/... URLs, so the public bucket must allow anonymous downloads
              mc anonymous set download "local/{{ $minio.buckets.public }}"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.teable.secret.name | quote }}
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.teable.secret.name | quote }}
                  key: minio-secret-key
{{- end }}
