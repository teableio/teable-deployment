{{- /* git-registry JWT keypair bootstrap: infra-service signs git credentials with the
       private key, git-registry verifies with the public key. Internal environments
       provision the Secret by hand; a bare install generates it here so the install is
       turnkey. Pre-install/pre-upgrade hook, idempotent: exits without touching an
       existing Secret, so keys never rotate on upgrade. Runs the infra-service image
       (Node) and talks to the Kubernetes API directly - no extra tooling image. */}}
{{- if and .Values.gitRegistry.enabled .Values.gitRegistry.jwtSecret.create }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $secretName := .Values.gitRegistry.jwtSecretName | default "git-registry-jwt" }}
{{- $image := .Values.gitRegistry.image | default .Values.infraService.image }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-registry-jwt-gen
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: git-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-7"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-registry-jwt-gen
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: git-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-6"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-registry-jwt-gen
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: git-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-6"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-registry-jwt-gen
subjects:
  - kind: ServiceAccount
    name: git-registry-jwt-gen
    namespace: {{ $namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: git-registry-jwt-gen
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: git-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-registry
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: git-registry-jwt-gen
      restartPolicy: Never
      {{- with .Values.infraService.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: generate
          image: {{ $image | quote }}
          env:
            - name: SECRET_NAME
              value: {{ $secretName | quote }}
            - name: PRIVATE_KEY_KEY
              value: {{ .Values.gitRegistry.jwtPrivateKeyKey | default "private" | quote }}
            - name: PUBLIC_KEY_KEY
              value: {{ .Values.gitRegistry.jwtPublicKeyKey | default "public" | quote }}
          command: ["node", "-e"]
          args:
            - |
              const fs = require('fs'), https = require('https'), crypto = require('crypto');
              const sa = '/var/run/secrets/kubernetes.io/serviceaccount';
              const token = fs.readFileSync(sa + '/token', 'utf8');
              const ca = fs.readFileSync(sa + '/ca.crt');
              const ns = fs.readFileSync(sa + '/namespace', 'utf8');
              const name = process.env.SECRET_NAME;
              const req = (method, path, body) => new Promise((resolve, reject) => {
                const r = https.request({
                  host: process.env.KUBERNETES_SERVICE_HOST,
                  port: process.env.KUBERNETES_SERVICE_PORT || 443,
                  path, method, ca,
                  headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
                }, (resp) => {
                  let d = '';
                  resp.on('data', (c) => { d += c; });
                  resp.on('end', () => resolve({ code: resp.statusCode, body: d }));
                });
                r.on('error', reject);
                if (body) r.write(JSON.stringify(body));
                r.end();
              });
              (async () => {
                const get = await req('GET', '/api/v1/namespaces/' + ns + '/secrets/' + name);
                if (get.code === 200) { console.log('secret ' + name + ' exists, leaving it untouched'); return; }
                if (get.code !== 404) throw new Error('unexpected ' + get.code + ': ' + get.body);
                const { publicKey, privateKey } = crypto.generateKeyPairSync('ed25519');
                const stringData = {};
                stringData[process.env.PRIVATE_KEY_KEY] = privateKey.export({ type: 'pkcs8', format: 'pem' });
                stringData[process.env.PUBLIC_KEY_KEY] = publicKey.export({ type: 'spki', format: 'pem' });
                const create = await req('POST', '/api/v1/namespaces/' + ns + '/secrets', {
                  apiVersion: 'v1', kind: 'Secret',
                  metadata: { name }, type: 'Opaque', stringData,
                });
                if (create.code !== 201) throw new Error('create failed ' + create.code + ': ' + create.body);
                console.log('created secret ' + name);
              })().catch((e) => { console.error(e); process.exit(1); });
{{- end }}
