{{- /* Bundled PostgreSQL for the Teable app: PVC + Deployment + Service (single node; internal profiles run managed databases instead). */}}
{{- if .Values.postgres.enabled }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $postgres := .Values.postgres }}
{{- $serviceName := printf "%s-postgres" .Release.Name }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $serviceName }}-data
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $postgres.storage.size | default "20Gi" | quote }}
  {{- with $postgres.storage.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 1
  # PVC is RWO; a rolling update would have old and new Pods contend for the same disk, so Recreate is required
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: opensandbox
    spec:
      containers:
        - name: postgres
          image: {{ $postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.teable.db.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.teable.db.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.teable.secret.name | quote }}
                  key: db-password
            {{- /* Block-storage PVCs ship a lost+found directory at the mount root, which initdb refuses; nesting the data dir one level down avoids that. */}}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $serviceName }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
