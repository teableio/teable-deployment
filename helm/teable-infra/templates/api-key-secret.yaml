{{- /*
Shared OpenSandbox API key bootstrap for a turnkey install: infra-service,
opensandbox-server and the bundled Teable app all reference this Secret, but
nothing created it before (internal environments provision it by hand), so a
bare install would fail without it.
Idempotent: on upgrade the existing value is reused (lookup), so all consumers
keep authenticating with the same key.
Guard: if the Secret already exists but is not owned by this release (externally
managed, e.g. created via kubectl), the chart skips it instead of colliding.
*/}}
{{- if .Values.apiKeySecret.create }}
{{- $namespace := .Values.infraService.namespaceOverride | default .Release.Namespace }}
{{- $name := .Values.apiKeySecret.name }}
{{- $existing := lookup "v1" "Secret" $namespace $name }}
{{- $existingAnnotations := dict }}
{{- if $existing }}
{{- $existingAnnotations = $existing.metadata.annotations | default dict }}
{{- end }}
{{- $ownedByRelease := and $existing (eq (get $existingAnnotations "meta.helm.sh/release-name") .Release.Name) }}
{{- if or (not $existing) $ownedByRelease }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name | quote }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: opensandbox-api-key
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: opensandbox
type: Opaque
data:
  api-key: {{ get ($existing.data | default dict) "api-key" | default (randAlphaNum 48 | b64enc) }}
{{- end }}
{{- end }}
