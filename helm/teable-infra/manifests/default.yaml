apiVersion: apps/v1
kind: Deployment
metadata:
  name: teable-minio
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: teable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: teable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        args:
        - server
        - "/data"
        ports:
        - name: s3
          containerPort: 9000
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: minio-access-key
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: minio-secret-key
        - name: MINIO_BROWSER
          value: 'off'
        readinessProbe:
          httpGet:
            path: "/minio/health/ready"
            port: s3
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: "/minio/health/live"
            port: s3
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: "/data"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: teable-minio-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teable-postgres
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: teable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: teable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
    spec:
      containers:
      - name: postgres
        image: postgres:15.4
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: teable
        - name: POSTGRES_USER
          value: teable
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: db-password
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        readinessProbe:
          exec:
            command:
            - sh
            - "-c"
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - sh
            - "-c"
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: "/var/lib/postgresql/data"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: teable-postgres-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teable-redis
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: teable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: teable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
    spec:
      containers:
      - name: redis
        image: redis:7.2.4
        command:
        - sh
        - "-c"
        - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
        ports:
        - name: redis
          containerPort: 6379
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: redis-password
        - name: REDISCLI_AUTH
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: redis-password
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - name: data
          mountPath: "/data"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: teable-redis-data
