apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: teable-image-preheater
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: opensandbox-image-preheater
    app.kubernetes.io/instance: teable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opensandbox
  annotations:
    teable.ai/preheat-images: '["ghcr.io/teableio/opensandbox-execd:v1.0.19-fix2","ghcr.io/teableio/opensandbox-egress:v1.0.12"]'
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opensandbox-image-preheater
      app.kubernetes.io/instance: teable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensandbox-image-preheater
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
      annotations:
        teable.ai/preheat-images: '["ghcr.io/teableio/opensandbox-execd:v1.0.19-fix2","ghcr.io/teableio/opensandbox-egress:v1.0.12"]'
    spec:
      containers:
      - name: preheater
        image: ghcr.io/teableio/opensandbox-image-committer:v0.1.0
        imagePullPolicy: IfNotPresent
        command:
        - "/bin/sh"
        - "-ec"
        args:
        - |
          nerdctl_base="nerdctl --address /run/containerd/containerd.sock --namespace k8s.io"

          if [ -f /var/run/opensandbox/registry/.dockerconfigjson ]; then
            mkdir -p /root/.docker
            cp /var/run/opensandbox/registry/.dockerconfigjson /root/.docker/config.json
            chmod 0600 /root/.docker/config.json
          fi

          while true; do
            ok=1
            image="ghcr.io/teableio/opensandbox-execd:v1.0.19-fix2"
            attempt=1
            pulled=0
            while [ "$attempt" -le 3 ]; do
              echo "Pulling ${image}, attempt ${attempt}"
              if $nerdctl_base pull "$image"; then
                pulled=1
                break
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
            if [ "$pulled" != "1" ]; then
              ok=0
            fi
            image="ghcr.io/teableio/opensandbox-egress:v1.0.12"
            attempt=1
            pulled=0
            while [ "$attempt" -le 3 ]; do
              echo "Pulling ${image}, attempt ${attempt}"
              if $nerdctl_base pull "$image"; then
                pulled=1
                break
              fi
              attempt=$((attempt + 1))
              sleep 5
            done
            if [ "$pulled" != "1" ]; then
              ok=0
            fi
            if [ "$ok" = "1" ]; then
              date -u +"%Y-%m-%dT%H:%M:%SZ" > /tmp/preheater-ready
            fi
            sleep 3600
          done
        securityContext:
          privileged: true
          runAsUser: 0
          runAsGroup: 0
        readinessProbe:
          exec:
            command:
            - test
            - "-f"
            - "/tmp/preheater-ready"
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: containerd-sock
          mountPath: "/run/containerd/containerd.sock"
      volumes:
      - name: containerd-sock
        hostPath:
          path: "/run/containerd/containerd.sock"
          type: Socket
