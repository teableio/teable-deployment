    spec:
      containers:
      - name: git-registry
        image: ghcr.io/teableio/teable-infra-service:20260716T101134Z
        imagePullPolicy: IfNotPresent
        command:
        - node
        - ".output/git-registry/server.mjs"
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: GIT_REGISTRY_PORT
          value: '8080'
        - name: GIT_REGISTRY_DATA_DIR
          value: "/data"
        - name: GIT_REGISTRY_HOOKS_DIR
          value: "/app/hooks"
        - name: GIT_REGISTRY_REPO_SIZE_LIMIT
          value: '1.048576e+08'
        - name: GIT_REGISTRY_MAX_INPUT_SIZE
          value: '6.7108864e+07'
        - name: GIT_REGISTRY_MAX_CONCURRENT_GIT
          value: '32'
        - name: GIT_REGISTRY_GIT_TIMEOUT_MS
          value: '120000'
        - name: GIT_REGISTRY_TRASH_RETENTION_DAYS
          value: '7'
        - name: GIT_REGISTRY_GC_UTC_HOUR
          value: '19'
        - name: GIT_REGISTRY_BASE_PATH
          value: "/git"
        - name: GIT_REGISTRY_JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: git-registry-jwt
              key: public
        - name: GIT_REGISTRY_INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: opensandbox-api-key
              key: api-key
        readinessProbe:
          httpGet:
            path: "/healthz"
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: "/healthz"
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: "/data"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: teable-git-registry-data
