apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensandbox-server
  namespace: opensandbox-system
  labels:
    helm.sh/chart: opensandbox-server-0.1.0
    app.kubernetes.io/name: opensandbox-server
    app.kubernetes.io/instance: teable
    app.kubernetes.io/version: 0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: opensandbox-server
    app.kubernetes.io/part-of: opensandbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opensandbox-server
      app.kubernetes.io/instance: teable
  template:
    metadata:
      annotations:
        checksum/config-toml: 021b7064c7a4f874b83e7da06d399c5cfa8971eab7cc715a02ecdec429751ef8
        checksum/batchsandbox-template: bf1caf1b588a88e298710c18206c85db07f5b5ea7f04662da8bb4ee76394cd33
      labels:
        app.kubernetes.io/name: opensandbox-server
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
    spec:
      serviceAccountName: opensandbox-server
      containers:
      - name: main
        image: ghcr.io/teableio/opensandbox-server:v0.2.0-fix6
        imagePullPolicy: IfNotPresent
        command:
        - "/bin/sh"
        - "-ec"
        args:
        - |
          mkdir -p /tmp/opensandbox
          python3 - <<'PY'
          import os
          from pathlib import Path

          source = Path("/etc/opensandbox/config.toml")
          target = Path("/tmp/opensandbox/config.toml")
          api_key = os.environ.get("OPENSANDBOX_API_KEY", "")
          text = source.read_text()
          text = text.replace('api_key = ""', f'api_key = "{api_key}"', 1)
          target.write_text(text)
          PY
          exec opensandbox-server --config /tmp/opensandbox/config.toml
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: SANDBOX_CONFIG_PATH
          value: "/etc/opensandbox/config.toml"
        - name: OPENSANDBOX_API_KEY
          valueFrom:
            secretKeyRef:
              key: api-key
              name: opensandbox-api-key
        volumeMounts:
        - name: config
          mountPath: "/etc/opensandbox/config.toml"
          subPath: config.toml
          readOnly: true
        - name: config
          mountPath: "/etc/opensandbox/batchsandbox-template.yaml"
          subPath: batchsandbox-template.yaml
          readOnly: true
        livenessProbe:
          httpGet:
            path: "/health"
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: "/health"
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: '2'
            memory: 8Gi
          requests:
            cpu: '1'
            memory: 4Gi
      volumes:
      - name: config
        configMap:
          name: opensandbox-server-config
---
