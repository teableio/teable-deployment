        - name: BACKEND_STORAGE_MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: minio-secret-key
        - name: BACKEND_STORAGE_PUBLIC_BUCKET
          value: teable-public
        - name: BACKEND_STORAGE_PRIVATE_BUCKET
          value: teable-private
        - name: BACKEND_STORAGE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: storage-encryption-key
        - name: BACKEND_STORAGE_ENCRYPTION_IV
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: storage-encryption-iv
        - name: SANDBOX_PROVIDER
          value: opensandbox
        - name: APP_DEPLOY_PROVIDER
          value: docker-runtime
        - name: TEABLE_INFRA_API_URL
          value: https://infra.teable.example.org
        - name: TEABLE_INFRA_API_KEY
          valueFrom:
            secretKeyRef:
              name: opensandbox-api-key
              key: api-key
        - name: TEABLE_INFRA_BUCKET
          value: teable-agent
        - name: SANDBOX_OPENSANDBOX_IMAGE
          value: ghcr.io/teableio/teable-sandbox-agent
        - name: SANDBOX_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: sandbox-jwt-secret
        readinessProbe:
          httpGet:
            path: "/health"
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: "/health"
            port: http
          initialDelaySeconds: 300
          periodSeconds: 20
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: assets
          mountPath: "/app/.assets"
      volumes:
      - name: assets
        persistentVolumeClaim:
          claimName: teable-teable-assets
