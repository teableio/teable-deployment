apiVersion: batch/v1
kind: Job
metadata:
  name: git-registry-jwt-gen
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: git-registry
    app.kubernetes.io/instance: teable
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-registry
        app.kubernetes.io/instance: teable
    spec:
      serviceAccountName: git-registry-jwt-gen
      restartPolicy: Never
      containers:
      - name: generate
        image: ghcr.io/teableio/teable-infra-service:20260716T101134Z
        env:
        - name: SECRET_NAME
          value: git-registry-jwt
        - name: PRIVATE_KEY_KEY
          value: private
        - name: PUBLIC_KEY_KEY
          value: public
        command:
        - node
        - "-e"
        args:
        - |
          const fs = require('fs'), https = require('https'), crypto = require('crypto');
          const sa = '/var/run/secrets/kubernetes.io/serviceaccount';
          const token = fs.readFileSync(sa + '/token', 'utf8');
          const ca = fs.readFileSync(sa + '/ca.crt');
          const ns = fs.readFileSync(sa + '/namespace', 'utf8');
          const name = process.env.SECRET_NAME;
          const req = (method, path, body) => new Promise((resolve, reject) => {
            const r = https.request({
              host: process.env.KUBERNETES_SERVICE_HOST,
              port: process.env.KUBERNETES_SERVICE_PORT || 443,
              path, method, ca,
              headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
            }, (resp) => {
              let d = '';
              resp.on('data', (c) => { d += c; });
              resp.on('end', () => resolve({ code: resp.statusCode, body: d }));
            });
            r.on('error', reject);
            if (body) r.write(JSON.stringify(body));
            r.end();
          });
          (async () => {
            const get = await req('GET', '/api/v1/namespaces/' + ns + '/secrets/' + name);
            if (get.code === 200) { console.log('secret ' + name + ' exists, leaving it untouched'); return; }
            if (get.code !== 404) throw new Error('unexpected ' + get.code + ': ' + get.body);
            const { publicKey, privateKey } = crypto.generateKeyPairSync('ed25519');
            const stringData = {};
            stringData[process.env.PRIVATE_KEY_KEY] = privateKey.export({ type: 'pkcs8', format: 'pem' });
            stringData[process.env.PUBLIC_KEY_KEY] = publicKey.export({ type: 'spki', format: 'pem' });
            const create = await req('POST', '/api/v1/namespaces/' + ns + '/secrets', {
              apiVersion: 'v1', kind: 'Secret',
              metadata: { name }, type: 'Opaque', stringData,
            });
            if (create.code !== 201) throw new Error('create failed ' + create.code + ': ' + create.body);
            console.log('created secret ' + name);
          })().catch((e) => { console.error(e); process.exit(1); });
---
apiVersion: batch/v1
kind: Job
metadata:
  name: teable-minio-init
  namespace: opensandbox-system
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/instance: teable
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opensandbox
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/instance: teable
        app.kubernetes.io/part-of: opensandbox
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init
        image: minio/mc:RELEASE.2025-04-16T18-13-26Z
        command:
        - "/bin/sh"
        - "-ec"
        args:
        - |
          # The post-install hook can fire before the MinIO Pod is Ready; alias set doubles as the wait loop
          until mc alias set local "http://teable-minio:9000" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
            echo "waiting for minio"
            sleep 2
          done
          mc mb --ignore-existing "local/teable-app-artifacts"
          mc mb --ignore-existing "local/teable-public"
          mc mb --ignore-existing "local/teable-private"
          # The app links avatars/attachments as plain <origin>/<bucket>/... URLs, so the public bucket must allow anonymous downloads
          mc anonymous set download "local/teable-public"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: minio-access-key
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: teable-app-secrets
              key: minio-secret-key
