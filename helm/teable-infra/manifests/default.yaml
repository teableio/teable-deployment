apiVersion: v1
kind: ConfigMap
metadata:
  name: opensandbox-server-config
  namespace: opensandbox-system
  labels:
    helm.sh/chart: opensandbox-server-0.1.0
    app.kubernetes.io/name: opensandbox-server
    app.kubernetes.io/instance: teable
    app.kubernetes.io/version: 0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: opensandbox-server
    app.kubernetes.io/part-of: opensandbox
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = 80
    api_key = ""

    [log]
    level = "INFO"

    [runtime]
    type = "kubernetes"
    execd_image = "ghcr.io/teableio/opensandbox-execd:v1.0.19-fix2"

    [kubernetes]
    kubeconfig_path = ""
    namespace = "teable-sandbox"
    informer_enabled = true
    informer_resync_seconds = 300
    informer_watch_timeout_seconds = 60
    sandbox_create_timeout_seconds = 86400
    sandbox_create_poll_interval_seconds = 0.5
    snapshot_create_timeout_seconds = 900
    workload_provider = "batchsandbox"
    batchsandbox_template_file = "/etc/opensandbox/batchsandbox-template.yaml"

    [egress]
    image = "ghcr.io/teableio/opensandbox-egress:v1.0.12"
    mode = "dns+nft"

    [ingress]
    mode = "gateway"

    gateway.address = "*.sandbox.teable.example.org"
    gateway.route.mode = "wildcard"
  batchsandbox-template.yaml: |
    # Metadata template (merged with runtime-generated metadata)
    metadata:
    # Spec template
    spec:
      replicas: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: Unconfined
          containers:
            - name: sandbox
              volumeMounts:
                - name: workspace-state
                  mountPath: /home/agent/workspace-state
          volumes:
            - name: workspace-state
              emptyDir: {}
